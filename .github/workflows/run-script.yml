name: Daily Run Script

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 08:00 运行 (UTC 0:00)
  workflow_dispatch:      # 允许手动点击运行

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 显式安装兼容版本的 tatsu 以修复 ImportError
        pip install "tatsu<5.0.0"
        pip install requests lxml ics 

    - name: Run Python script
      env:
        TZ: Asia/Shanghai
      run: python run3.py

    - name: Commit generated movies.ics
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add movies.ics
        # 即使文件没变化也不会报错导致 Workflow 失败
        git commit -m "Update movies.ics [skip ci]" || echo "No changes to commit"
        git push
