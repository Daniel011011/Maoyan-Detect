name: Daily Run Script

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 08:00
  workflow_dispatch:      

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # 改用 3.10 版本，彻底避开 Python 3.12 对旧库的不兼容问题
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 在 Python 3.10 下，这两个版本可以完美配合
        pip install requests lxml ics
        pip install "tatsu==4.4.0"
        pip install "ics==0.7"
        

    - name: Run Python script
      env:
        TZ: Asia/Shanghai
      run: python run3.py

    - name: Commit generated movies.ics
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add movies.ics
        git commit -m "Update movies.ics [skip ci]" || echo "No changes to commit"
        git push
