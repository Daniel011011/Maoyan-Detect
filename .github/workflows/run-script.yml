name: Daily Run Script

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 08:00
  workflow_dispatch:      

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # 必须用 3.10，因为 3.12 彻底删除了旧版 tatsu 依赖的底层接口
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 这里的版本号是根据 2月17日前“最后稳定期”确定的
        pip install requests==2.31.0
        pip install lxml==5.1.0
        pip install "tatsu==4.4.0"
        pip install "ics==0.7.2"

    - name: Run Python script
      env:
        TZ: Asia/Shanghai
      run: python run3.py

    - name: Commit generated movies.ics
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add movies.ics
        git commit -m "Update movies.ics [skip ci]" || echo "No changes to commit"
        git push
